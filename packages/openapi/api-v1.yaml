              properties:
                token:
                  type: string
                  minLength: 6
                  maxLength: 6
                secret:
                  type: string
              required:
                - token
                - secret
      responses:
        '200':
          description: 2FA enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      backupCodes:
                        type: array
                        items:
                          type: string
                    required:
                      - backupCodes
                required:
                  - data
        '400':
          description: Invalid verification code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

