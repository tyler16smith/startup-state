openapi: 3.1.0
info:
  title: Finance with Fin REST API
  version: 1.0.0
  description: Platform API for web, iOS, and native clients

servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://api.example.com
    description: Production

paths:
  /api/health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Health check endpoint
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ['ok']
                required:
                  - status

  /api/v1/ping/get:
    get:
      operationId: getPing
      tags:
        - Health
      summary: Ping endpoint to verify API connectivity
      responses:
        '200':
          description: Pong response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: ['ok']
                    required:
                      - status
                required:
                  - data

  /api/v1/category/list:
    get:
      operationId: listCategories
      tags:
        - Category
      summary: List all categories (built-in + user-created)
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/category/create:
    post:
      operationId: createCategory
      tags:
        - Category
      summary: Create a new user category
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
              required:
                - name
      responses:
        '200':
          description: Created category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/category/update:
    post:
      operationId: updateCategory
      tags:
        - Category
      summary: Update an existing category
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
              required:
                - id
                - name
      responses:
        '200':
          description: Updated category
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/category/delete:
    post:
      operationId: deleteCategory
      tags:
        - Category
      summary: Delete a category
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
              required:
                - id
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                    required:
                      - success
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/category/toggleHidden:
    post:
      operationId: toggleCategoryHidden
      tags:
        - Category
      summary: Hide or show a category
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                isHidden:
                  type: boolean
              required:
                - id
                - isHidden
      responses:
        '200':
          description: Category visibility updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrappedSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/hasData:
    get:
      operationId: hasTransactionData
      tags:
        - Transaction
      summary: Check if user has any transactions
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: Data presence check
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: boolean
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/listCategories:
    get:
      operationId: listTransactionCategories
      tags:
        - Transaction
      summary: List all available category names
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: List of category names
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/getAll:
    post:
      operationId: getAllTransactions
      tags:
        - Transaction
      summary: Get transactions with filtering and pagination
      security:
        - {}
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                category:
                  type: string
                type:
                  type: string
                  enum: ['INCOME', 'EXPENSE']
                search:
                  type: string
                hashtag:
                  type: string
                sortField:
                  type: string
                  enum: ['date', 'amount', 'account']
                  default: date
                sortDir:
                  type: string
                  enum: ['asc', 'desc']
                  default: desc
                limit:
                  type: integer
                  minimum: 1
                  maximum: 200
                  default: 100
                cursor:
                  type: integer
                  minimum: 0
                  default: 0
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'
                      nextCursor:
                        type: integer
                        nullable: true
                    required:
                      - items
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/count:
    post:
      operationId: countTransactions
      tags:
        - Transaction
      summary: Count transactions matching filters
      security:
        - {}
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: ['INCOME', 'EXPENSE']
                search:
                  type: string
                hashtag:
                  type: string
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Transaction count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: integer
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/getSummary:
    post:
      operationId: getTransactionSummary
      tags:
        - Transaction
      summary: Get income and expense summary with filters
      security:
        - {}
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: ['INCOME', 'EXPENSE']
                search:
                  type: string
                hashtag:
                  type: string
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Transaction summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      incomeSum:
                        type: number
                      incomeCount:
                        type: integer
                      expenseSum:
                        type: number
                      expenseCount:
                        type: integer
                    required:
                      - incomeSum
                      - incomeCount
                      - expenseSum
                      - expenseCount
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/getMonthlyAggregates:
    post:
      operationId: getMonthlyAggregates
      tags:
        - Transaction
      summary: Get monthly income/expense aggregates
      security:
        - {}
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                months:
                  type: integer
                  minimum: 1
                  maximum: 60
                  default: 24
      responses:
        '200':
          description: Monthly aggregates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      months:
                        type: array
                        items:
                          type: object
                          properties:
                            month:
                              type: string
                            income:
                              type: number
                            expenses:
                              type: number
                            netGain:
                              type: number
                          required:
                            - month
                            - income
                            - expenses
                            - netGain
                      avgNetGain:
                        type: number
                    required:
                      - months
                      - avgNetGain
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/investment/getPortfolioAllocation:
    get:
      operationId: getPortfolioAllocation
      tags:
        - Investment
      summary: Get portfolio allocation across investments, cash, and real estate
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: Portfolio allocation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      sections:
                        type: array
                        items:
                          $ref: '#/components/schemas/PortfolioAllocationSection'
                    required:
                      - sections
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/getSummaryMetrics:
    get:
      operationId: getSummaryMetrics
      tags:
        - Transaction
      summary: Get average income/expense metrics over last 12 months
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: Summary metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      avgIncome:
                        type: number
                      avgExpenses:
                        type: number
                      avgNetGain:
                        type: number
                      monthCount:
                        type: integer
                    required:
                      - avgIncome
                      - avgExpenses
                      - avgNetGain
                      - monthCount
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/getPreviousMonthCashFlow:
    get:
      operationId: getPreviousMonthCashFlow
      tags:
        - Transaction
      summary: Get previous month cash flow Sankey data (income streams → income → expense categories + savings)
      parameters:
        - in: query
          name: month
          required: false
          schema:
            type: string
            pattern: '^\\d{4}-\\d{2}$'
          description: Month to fetch in yyyy-MM format. Defaults to previous month.
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: Previous month cash flow
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      month:
                        type: string
                      startDate:
                        type: string
                      endDate:
                        type: string
                      totalIncome:
                        type: number
                      totalExpenses:
                        type: number
                      netSavings:
                        type: number
                      nodes:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            kind:
                              type: string
                              enum: ['income_stream', 'income', 'expense', 'savings']
                            amount:
                              type: number
                          required:
                            - name
                            - kind
                            - amount
                      links:
                        type: array
                        items:
                          type: object
                          properties:
                            source:
                              type: integer
                            target:
                              type: integer
                            value:
                              type: number
                          required:
                            - source
                            - target
                            - value
                    required:
                      - month
                      - startDate
                      - endDate
                      - totalIncome
                      - totalExpenses
                      - netSavings
                      - nodes
                      - links
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/bulkUpdateType:
    post:
      operationId: bulkUpdateTransactionType
      tags:
        - Transaction
      summary: Bulk update transaction type for multiple transactions
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                type:
                  type: string
                  enum: ['INCOME', 'EXPENSE']
              required:
                - ids
                - type
      responses:
        '200':
          description: Bulk update completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                    required:
                      - success
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/bulkDelete:
    post:
      operationId: bulkDeleteTransactions
      tags:
        - Transaction
      summary: Bulk delete multiple transactions
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
              required:
                - ids
      responses:
        '200':
          description: Bulk delete completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                    required:
                      - success
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/updateCategory:
    post:
      operationId: updateTransactionCategory
      tags:
        - Transaction
      summary: Update the category of a transaction
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                categoryName:
                  type: string
                  minLength: 1
              required:
                - id
                - categoryName
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      categoryId:
                        type: string
                      categoryName:
                        type: string
                    required:
                      - categoryId
                      - categoryName
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/updateType:
    post:
      operationId: updateTransactionType
      tags:
        - Transaction
      summary: Update the type of a transaction
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                type:
                  type: string
                  enum: ['INCOME', 'EXPENSE']
              required:
                - id
                - type
      responses:
        '200':
          description: Type updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                    required:
                      - success
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/update:
    post:
      operationId: updateTransaction
      tags:
        - Transaction
      summary: Update transaction details
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                description:
                  type: string
                amount:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                type:
                  type: string
                  enum: ['INCOME', 'EXPENSE']
              required:
                - id
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                    required:
                      - success
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/split:
    post:
      operationId: splitTransaction
      tags:
        - Transaction
      summary: Split a transaction into two transaction rows
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                description:
                  type: string
                originalAmount:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                splitAmount:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                type:
                  type: string
                  enum: ['INCOME', 'EXPENSE']
                originalCategoryName:
                  type: string
                  minLength: 1
                splitCategoryName:
                  type: string
                  minLength: 1
                hashtags:
                  type: array
                  items:
                    type: string
              required:
                - id
                - originalAmount
                - splitAmount
                - type
                - originalCategoryName
                - splitCategoryName
      responses:
        '200':
          description: Transaction split completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      originalId:
                        type: string
                      splitId:
                        type: string
                    required:
                      - success
                      - originalId
                      - splitId
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/unsplit:
    post:
      operationId: unsplitTransaction
      tags:
        - Transaction
      summary: Remove a two-way transaction split
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
              required:
                - id
      responses:
        '200':
          description: Transaction split removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      restoredId:
                        type: string
                      removedIds:
                        type: array
                        items:
                          type: string
                    required:
                      - success
                      - restoredId
                      - removedIds
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/transaction/delete:
    post:
      operationId: deleteTransaction
      tags:
        - Transaction
      summary: Delete a transaction
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
              required:
                - id
      responses:
        '200':
          description: Transaction deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                    required:
                      - success
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/hashtag/list:
    get:
      operationId: listHashtags
      tags:
        - Hashtag
      summary: List all user hashtags with usage counts
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: List of hashtags
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Hashtag'
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/hashtag/setOnTransaction:
    post:
      operationId: setHashtagsOnTransaction
      tags:
        - Hashtag
      summary: Set hashtags on a transaction
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                hashtags:
                  type: array
                  items:
                    type: string
              required:
                - transactionId
                - hashtags
      responses:
        '200':
          description: Hashtags set
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                    required:
                      - success
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/rule/list:
    get:
      operationId: listRules
      tags:
        - Rule
      summary: List all transaction rules for the user
      security:
        - {}
        - sessionCookie: []
      responses:
        '200':
          description: List of rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionRule'
                required:
                  - data
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/rule/getById:
    post:
      operationId: getRuleById
      tags:
        - Rule
      summary: Get a specific transaction rule by ID
      security:
        - {}
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
              required:
                - id
      responses:
        '200':
          description: The requested rule
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TransactionRule'
                required:
                  - data
        '401':
